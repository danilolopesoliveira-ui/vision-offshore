services:
  - type: web
    name: vision-offshore
    env: node
    plan: free
    region: ohio
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Vision Offshore <no-reply@gennesys.com.br>"
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FIRST_SUPER_ADMIN_EMAIL
        sync: false
      - key: FIRST_ACCESS_CODE
        sync: false
      - key: CRON_SECRET
        sync: false
